<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Quiet Time</title>
  <style>
    :root {
      --bg: #000000;
      --bar: #ff1f1f;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --button-bg: #111111;
      --button-border: rgba(255, 255, 255, 0.14);
      --happy: #ffe45c;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    .bar-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: stretch;
      background: #000;
    }

    .bar {
      width: 100%;
      height: 100%;
      background: var(--bar);
      transform-origin: bottom center;
      transform: scaleY(1);
      transition: transform 0.08s linear;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.22) inset;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
      pointer-events: none;
    }

    .top {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    .status {
      background: rgba(0, 0, 0, 0.45);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 15px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .center {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 18px;
    }

    .happy {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.55);
      padding: 24px 22px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .happy.show {
      display: flex;
    }

    .face {
      font-size: min(34vw, 160px);
      line-height: 1;
      color: var(--happy);
      text-shadow: 0 0 26px rgba(255, 228, 92, 0.22);
    }

    .happy-text {
      font-size: min(7vw, 34px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }

    .bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      pointer-events: auto;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--button-border);
      border-radius: 18px;
      background: var(--button-bg);
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 14px 18px;
      min-width: 140px;
      min-height: 54px;
    }

    button:active {
      transform: scale(0.98);
    }

    .meter-row {
      width: min(92vw, 460px);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 999px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
    }

    .meter-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .meter-track {
      position: relative;
      flex: 1;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
    }

    .meter-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: #ffffff;
      border-radius: 999px;
      transition: width 0.08s linear;
    }

    @media (orientation: landscape) {
      .status {
        font-size: 13px;
      }

      .happy-text {
        font-size: min(5vw, 28px);
      }

      .face {
        font-size: min(22vw, 120px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bar-wrap">
      <div class="bar" id="bar"></div>
    </div>

    <div class="overlay">
      <div class="top">
        <div class="status" id="status">Tap Start to begin</div>
      </div>

      <div class="center">
        <div class="happy" id="happy">
          <div class="face">😊</div>
          <div class="happy-text">Great job staying quiet</div>
        </div>
      </div>

      <div class="bottom">
        <div class="meter-row">
          <div class="meter-label">Sound</div>
          <div class="meter-track">
            <div class="meter-fill" id="soundMeter"></div>
          </div>
        </div>

        <div class="controls">
          <button id="startBtn">Start</button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DRAIN_MS = 5 * 60 * 1000;
    const SOUND_THRESHOLD = 0.09;
    const SUSTAINED_FRAMES_REQUIRED = 2;
    const QUIET_REARM_MS = 450;

    const barEl = document.getElementById('bar');
    const statusEl = document.getElementById('status');
    const happyEl = document.getElementById('happy');
    const soundMeterEl = document.getElementById('soundMeter');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let sourceNode = null;
    let wakeLock = null;
    let running = false;
    let lastResetAt = 0;
    let lastNoiseAt = 0;
    let aboveThresholdFrames = 0;
    let animationFrameId = 0;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator && navigator.wakeLock?.request) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => {
            if (running) {
              statusEl.textContent = 'Screen lock released by browser';
            }
          });
        }
      } catch (e) {
      }
    }

    async function ensureWakeLock() {
      if (!document.hidden) {
        await requestWakeLock();
      }
    }

    function resetTimer() {
      lastResetAt = performance.now();
      happyEl.classList.remove('show');
    }

    function resetAll() {
      resetTimer();
      updateBar(1);
      soundMeterEl.style.width = '0%';
      statusEl.textContent = running ? 'Listening for sound...' : 'Tap Start to begin';
    }

    function updateBar(progress) {
      const clamped = Math.max(0, Math.min(1, progress));
      barEl.style.transform = `scaleY(${clamped})`;
    }

    function showHappy() {
      happyEl.classList.add('show');
      statusEl.textContent = 'Quiet time complete';
    }

    function computeLevel(data) {
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        const v = (data[i] - 128) / 128;
        sum += v * v;
      }
      return Math.sqrt(sum / data.length);
    }

    function tick() {
      if (!running || !analyser) {
        return;
      }

      const data = new Uint8Array(analyser.fftSize);
      analyser.getByteTimeDomainData(data);
      const level = computeLevel(data);
      const meterPercent = Math.max(0, Math.min(100, (level / 0.35) * 100));
      soundMeterEl.style.width = `${meterPercent}%`;

      const now = performance.now();
      const isLoud = level >= SOUND_THRESHOLD;

      if (isLoud) {
        aboveThresholdFrames += 1;
      } else {
        aboveThresholdFrames = 0;
      }

      const rearmed = now - lastNoiseAt > QUIET_REARM_MS;
      if (isLoud && aboveThresholdFrames >= SUSTAINED_FRAMES_REQUIRED && rearmed) {
        lastNoiseAt = now;
        resetTimer();
        statusEl.textContent = 'Noise detected — timer reset';
      }

      const elapsed = now - lastResetAt;
      const re
